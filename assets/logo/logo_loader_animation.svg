<svg width="240" height="130" viewBox="0 0 300 162" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Clip 1: exact shape1 zone x=0..92 -->
    <clipPath id="v9c1" clipPathUnits="userSpaceOnUse">
      <rect x="0" y="162" width="92" height="0">
        <animate attributeName="y"      values="162;162;0;0;0"   keyTimes="0;0.1;0.5;0.85;1" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0 0 1 1"/>
        <animate attributeName="height" values="0;0;162;162;162" keyTimes="0;0.1;0.5;0.85;1" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0 0 1 1"/>
      </rect>
    </clipPath>
    <!-- Clip 2: shape2 zone starts 1px to the LEFT at x=91 -->
    <clipPath id="v9c2" clipPathUnits="userSpaceOnUse">
      <rect x="91" y="0" width="93" height="0">
        <animate attributeName="height" values="0;0;162;162;162" keyTimes="0;0.2;0.6;0.85;1" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.4 0 0.2 1;0 0 1 1;0 0 1 1"/>
      </rect>
    </clipPath>
    <!-- Clip 3: semicircle slides UP -->
    <clipPath id="v9c3" clipPathUnits="userSpaceOnUse">
      <rect x="208" y="162" width="92" height="0">
        <animate attributeName="y"      values="162;162;116;116;116" keyTimes="0;0.35;0.75;0.85;1" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0 0 1 1"/>
        <animate attributeName="height" values="0;0;46;46;46"       keyTimes="0;0.35;0.75;0.85;1" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 0.2 1;0.4 0 0.2 1;0 0 1 1;0 0 1 1"/>
      </rect>
    </clipPath>
  </defs>
  <g>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.85;0.95;1" dur="2s" repeatCount="indefinite"/>
    <!-- Merged shape 1+2 path clipped to slide up/down from opposite ends -->
    <path d="M0,162 L0,46 A46,46 0 0,1 92,46 L92,0 L184,0 L184,116 A46,46 0 0,1 92,116 L92,162 Z" fill="#495057" clip-path="url(#v9c1)"/>
    <path d="M0,162 L0,46 A46,46 0 0,1 92,46 L92,0 L184,0 L184,116 A46,46 0 0,1 92,116 L92,162 Z" fill="#495057" clip-path="url(#v9c2)"/>
    <!-- Shape 3: semicircle dome-up, baseline at y=162 -->
    <path d="M208,162 A46,46 0 0,1 300,162 Z" fill="#495057" clip-path="url(#v9c3)"/>
  </g>
</svg>
